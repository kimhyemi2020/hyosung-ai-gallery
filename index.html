<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>인천효성고 시민개발자 갤러리</title>
<style>
:root{--blue:#164bdc;--blue2:#0b2f92;--yellow:#ffd739;--text:#10204a;--muted:#667394;--line:#dce6ff;--red:#d81b4c;}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:linear-gradient(180deg,#f1f6ff,#f9fbff);color:var(--text)}
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#477bff,#071c62);color:white;padding:34px 18px 42px;text-align:center}
.hero:after{content:"AI";position:absolute;right:8%;bottom:-10px;font-size:110px;font-weight:900;opacity:.12}
.badge{display:inline-block;background:var(--yellow);color:#0b2a73;border-radius:999px;padding:8px 16px;font-weight:900}
h1{font-size:clamp(34px,6vw,62px);margin:16px 0 8px;letter-spacing:-2px}
.hero p{margin:0 auto;max-width:820px;font-size:17px;line-height:1.7}
.wrap{width:min(1180px,calc(100% - 28px));margin:-24px auto 60px;position:relative}
.toolbar,.stat,.notice div,.card{background:white;border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 26px rgba(20,60,150,.09)}
.toolbar{padding:16px;display:grid;grid-template-columns:1fr 165px 135px;gap:10px}
input,select,button{font-family:inherit}
input,select{width:100%;border:1px solid #cbd8fb;border-radius:14px;padding:13px 14px;font-size:15px}
.refresh{border:0;border-radius:14px;background:#fff0f4;color:var(--red);font-weight:900;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.stat{padding:16px}.stat b{font-size:24px;color:var(--blue);display:block}
.notice{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.notice div{padding:14px 16px;border-left:6px solid var(--blue);line-height:1.5}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{overflow:hidden;display:flex;flex-direction:column;min-height:460px}
.thumb{height:138px;background:linear-gradient(135deg,#174bdc,#64b8ff);display:flex;align-items:center;justify-content:center;color:white;font-size:56px;position:relative}
.rank{position:absolute;left:14px;top:14px;background:white;color:#0b2f92;border-radius:999px;padding:7px 11px;font-weight:900;font-size:13px}
.hot{position:absolute;right:14px;top:14px;background:#fff0f4;color:var(--red);border-radius:999px;padding:7px 11px;font-weight:900;font-size:13px}
.body{padding:18px;display:flex;flex-direction:column;gap:10px;flex:1}
.title{font-size:23px;font-weight:900;margin:0;color:#071845}
.meta{font-size:14px;color:var(--muted)}
.desc{font-size:15px;line-height:1.55;min-height:48px;white-space:pre-line}
.info{background:#f7faff;border:1px solid #e1e9ff;border-radius:14px;padding:10px 12px;font-size:13px;line-height:1.45}
.btns{display:flex;gap:8px;margin-top:auto}
.run,.like{border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:900;text-align:center;text-decoration:none;cursor:pointer}
.run{background:var(--blue);color:white;flex:1}
.like{background:#fff1f4;color:var(--red);border:1px solid #ffd0dc;min-width:92px}
.comments{background:#f8faff;border-top:1px solid var(--line);padding:14px 18px 18px}
.comment{background:white;border:1px solid #e1e9ff;border-radius:12px;padding:9px 10px;font-size:13px;line-height:1.45;margin-bottom:7px}
.comment small{color:var(--muted);font-weight:800}
.commentForm{display:grid;grid-template-columns:82px 1fr 58px;gap:6px}
.commentForm input{padding:10px;font-size:13px;border-radius:11px}
.commentForm button{border:0;border-radius:11px;background:var(--blue);color:white;font-weight:900;cursor:pointer}
.empty,.loading{grid-column:1/-1;background:white;border:1px dashed #b6c8f5;border-radius:22px;text-align:center;padding:60px 20px;color:#637293;line-height:1.6}
footer{text-align:center;color:#687593;font-size:13px;margin:34px 0 12px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#071845;color:white;padding:12px 16px;border-radius:999px;font-size:14px;display:none;z-index:10}
@media(max-width:960px){.gallery{grid-template-columns:repeat(2,1fr)}.toolbar,.notice,.stats{grid-template-columns:1fr}}
@media(max-width:640px){.gallery{grid-template-columns:1fr}.commentForm{grid-template-columns:1fr}}
</style>
</head>
<body>
<section class="hero">
  <div class="badge">⭐ 인천효성고등학교 AI 중점학교</div>
  <h1>시민개발자 갤러리</h1>
  <p>학생들이 생성형 AI를 활용해 만든 웹 기반 프로그램을 공유하는 공간입니다. 작품을 실행해 보고 좋아요와 댓글로 서로 응원해 주세요.</p>
</section>
<main class="wrap">
  <section class="toolbar">
    <input id="searchInput" placeholder="작품명, 제작자, 작품 소개 검색" />
    <select id="sortSelect"><option value="latest">최신순</option><option value="likes">인기순</option><option value="title">작품명순</option></select>
    <button class="refresh" onclick="loadWorks()">새로고침</button>
  </section>
  <section class="stats">
    <div class="stat"><b id="workCount">0</b><span>공개 작품</span></div>
    <div class="stat"><b id="likeCount">0</b><span>전체 좋아요</span></div>
    <div class="stat"><b id="commentCount">0</b><span>전체 댓글</span></div>
  </section>
  <section class="notice">
    <div><b>문의</b><br>궁금한 것은 정보 선생님께 문의하세요.</div>
    <div><b>유의사항</b><br>인터넷 또는 타인의 작품을 무단 제출하거나 수정 없이 그대로 제출한 경우 심사 대상에서 제외될 수 있습니다.</div>
  </section>
  <section id="gallery" class="gallery"><div class="loading">작품을 불러오는 중입니다...</div></section>
  <footer>2026 인천효성고 시민개발자 코딩 페스타</footer>
</main>
<div id="toast" class="toast"></div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyhWCUWlbr1utPUKwdNIznHQ6vqQkfVcl-Vds0MIr6ottkckEzJy6P692Ep2UCvm-YB/exec";
let works = [];
const likedKey = "hyosung_gallery_liked_jsonp";
const gallery = document.querySelector("#gallery");
const searchInput = document.querySelector("#searchInput");
const sortSelect = document.querySelector("#sortSelect");

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const callback = "cb_" + Date.now() + "_" + Math.floor(Math.random()*100000);
    window[callback] = data => {
      resolve(data);
      delete window[callback];
      script.remove();
    };
    const qs = new URLSearchParams({...params, callback, v: Date.now()});
    const script = document.createElement("script");
    script.src = API_URL + "?" + qs.toString();
    script.onerror = () => {
      delete window[callback];
      script.remove();
      reject(new Error("JSONP load failed"));
    };
    document.body.appendChild(script);
  });
}

function getLiked(){try{return JSON.parse(localStorage.getItem(likedKey))||[]}catch{return []}}
function setLiked(arr){localStorage.setItem(likedKey, JSON.stringify(arr))}
function toast(msg){const t=document.querySelector("#toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",1600)}

async function loadWorks(){
  gallery.innerHTML = `<div class="loading">작품을 불러오는 중입니다...</div>`;
  try{
    works = await jsonp({action:"works"});
    updateStats();
    render();
  }catch(e){
    gallery.innerHTML = `<div class="empty">데이터를 불러오지 못했습니다.<br>Apps Script 코드를 JSONP 버전으로 교체하고 새 버전 배포했는지 확인하세요.</div>`;
  }
}

function updateStats(){
  document.querySelector("#workCount").textContent = works.length;
  document.querySelector("#likeCount").textContent = works.reduce((s,w)=>s+(Number(w.likes)||0),0);
  document.querySelector("#commentCount").textContent = works.reduce((s,w)=>s+((w.comments||[]).length),0);
}

function render(){
  const q = searchInput.value.trim().toLowerCase();
  const sort = sortSelect.value;
  let arr = works.filter(w => `${w.title} ${w.student} ${w.description} ${w.creativity||""}`.toLowerCase().includes(q));
  arr.sort((a,b)=> sort==="likes" ? (Number(b.likes)||0)-(Number(a.likes)||0) : sort==="title" ? String(a.title).localeCompare(String(b.title),"ko") : String(b.date||"").localeCompare(String(a.date||"")));
  if(arr.length===0){gallery.innerHTML=`<div class="empty">표시할 작품이 없습니다.<br>승인 열이 1인지 확인해 주세요.</div>`;return;}
  const liked=getLiked(); gallery.innerHTML="";
  arr.forEach((w,idx)=>{
    const isLiked=liked.includes(w.id);
    const comments=(w.comments||[]).slice(-3).map(c=>`<div class="comment"><small>${esc(c.name)}</small><br>${esc(c.text)}</div>`).join("") || `<div class="comment">아직 댓글이 없습니다.</div>`;
    const el=document.createElement("article"); el.className="card";
    el.innerHTML=`<div class="thumb"><div class="rank">#${idx+1}</div>${(Number(w.likes)||0)>=5?'<div class="hot">인기작</div>':''}${pickEmoji(w.title+" "+w.description)}</div>
    <div class="body"><h2 class="title">${esc(w.title)}</h2><div class="meta">${esc(w.student)} · ${esc(w.date||"")}</div><div class="desc">${esc(w.description)}</div>
    ${w.creativity?`<div class="info"><b>창의 포인트</b><br>${esc(w.creativity)}</div>`:""}
    <div class="btns"><a class="run" href="${esc(w.url)}" target="_blank" rel="noopener noreferrer">작품 실행하기</a><button class="like" onclick="likeWork('${esc(w.id)}')" ${isLiked?"disabled":""}>${isLiked?"💗":"❤️"} ${Number(w.likes)||0}</button></div></div>
    <div class="comments"><div>${comments}</div><form class="commentForm" onsubmit="addComment(event,'${esc(w.id)}')"><input name="name" placeholder="이름" required maxlength="10"><input name="text" placeholder="응원 댓글" required maxlength="80"><button>등록</button></form></div>`;
    gallery.appendChild(el);
  });
}

function pickEmoji(text){text=String(text).toLowerCase(); if(text.includes("퍼즐"))return"🧩"; if(text.includes("게임"))return"🎮"; if(text.includes("퀴즈"))return"🎯"; if(text.includes("급식")||text.includes("음식"))return"🍱"; if(text.includes("계산"))return"🧮"; if(text.includes("추천"))return"✨"; return"💻";}

async function likeWork(workId){
  const liked=getLiked();
  if(liked.includes(workId)){toast("이미 좋아요를 눌렀습니다.");return;}
  await jsonp({action:"like", workId});
  liked.push(workId); setLiked(liked); toast("좋아요가 반영되었습니다."); await loadWorks();
}

async function addComment(event, workId){
  event.preventDefault();
  const form=event.target; const name=form.name.value.trim(); const text=form.text.value.trim();
  if(!name||!text)return;
  await jsonp({action:"comment", workId, name, text});
  form.reset(); toast("댓글이 등록되었습니다."); await loadWorks();
}

function esc(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
searchInput.addEventListener("input", render);
sortSelect.addEventListener("change", render);
loadWorks();
</script>
</body>
</html>
